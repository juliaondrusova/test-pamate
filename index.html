<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test kognitívnej kapacity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=DM+Sans:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #fff;
            color: #0a0a0a;
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        #screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #main-display {
            font-family: 'DM Mono', monospace;
            font-size: clamp(3rem, 15vw, 10rem);
            font-weight: 500;
            text-align: center;
            min-height: 1.2em;
        }

        #level-badge {
            position: fixed;
            top: 3rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #999;
        }

        #progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 5px;
            background: #000;
            width: 0%;
        }

        #start-overlay {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            text-align: center;
        }

        .btn-start {
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            border: 1px solid #fff;
            background: none;
            color: white;
            font-family: 'DM Mono';
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-start:hover { background: #fff; color: #000; }

        #input-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        #user-input {
            width: 85%;
            padding: 12px;
            font-family: 'DM Mono', monospace;
            font-size: 2.2rem;
            text-align: center;
            border: 2px solid #000;
            outline: none;
            margin-bottom: 20px;
            border-radius: 4px;
            letter-spacing: 0.1em;
        }

        #submit-btn {
            padding: 12px 35px;
            background: #000;
            color: #fff;
            border: none;
            font-family: 'DM Mono';
            cursor: pointer;
        }

        .results-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 650px;
            padding: 2rem;
        }

        .results-table {
            width: 100%;
            margin: 20px 0;
            border-collapse: collapse;
            font-family: 'DM Mono', monospace;
        }
        .results-table td, .results-table th {
            border: 1px solid #ddd;
            padding: 10px;
        }

        .card { 
            background: #f4f4f4; 
            padding: 1.5rem; 
            border-radius: 10px; 
            margin: 10px 0; 
            text-align: center;
            border-bottom: 4px solid #000; 
            width: 100%;
        }
    </style>
</head>
<body>

<div id="start-overlay" onclick="startExperiment()">
    <h1 style="font-family: 'DM Mono';">Test kapacity pamäte</h1>
    <p style="margin-top:10px; color:#aaa;">Pripravte sa na digitálny zápis.</p>
    <button class="btn-start">SPUSTIŤ TEST</button>
</div>

<div id="screen">
    <div id="level-badge"></div>
    <div id="main-display"></div>
    
    <div id="input-container">
        <p id="timer-label" style="margin-bottom: 10px; font-family: 'DM Mono'; font-size: 1rem; color: #000; font-weight: bold;">Zostáva: 12s</p>
        <input type="text" id="user-input" inputmode="numeric" autocomplete="off">
        <button id="submit-btn" onclick="submitAnswer()">ODOSLAŤ</button>
    </div>

    <div id="progress-bar"></div>
</div>

<script>
const sequence = [
    { lvl: 1, label: 'LEVEL 1: 3 ČÍSLA (1/3)', digits: [7,2,9] },
    { lvl: 1, label: 'LEVEL 1: 3 ČÍSLA (2/3)', digits: [4,8,1] },
    { lvl: 1, label: 'LEVEL 1: 3 ČÍSLA (3/3)', digits: [3,6,5] },
    { lvl: 2, label: 'LEVEL 2: 5 ČÍSIEL (1/3)', digits: [4,1,8,5,3] },
    { lvl: 2, label: 'LEVEL 2: 5 ČÍSIEL (2/3)', digits: [7,9,2,6,0] },
    { lvl: 2, label: 'LEVEL 2: 5 ČÍSIEL (3/3)', digits: [5,3,1,7,4] },
    { lvl: 3, label: 'LEVEL 3: 7 ČÍSIEL (1/3)', digits: [9,2,6,3,1,8,5] },
    { lvl: 3, label: 'LEVEL 3: 7 ČÍSIEL (2/3)', digits: [4,7,1,5,9,2,6] },
    { lvl: 3, label: 'LEVEL 3: 7 ČÍSIEL (3/3)', digits: [8,3,0,6,4,1,7] },
    { lvl: 4, label: 'LEVEL 4: 9 ČÍSIEL (1/3)', digits: [5,3,9,1,4,8,2,7,6] },
    { lvl: 4, label: 'LEVEL 4: 9 ČÍSIEL (2/3)', digits: [2,7,4,0,6,3,9,1,8] },
    { lvl: 4, label: 'LEVEL 4: 9 ČÍSIEL (3/3)', digits: [6,1,8,4,7,0,3,5,2] }
];

let stepIndex = 0;
let userResults = [];
let inputTimeout;
let countdownInterval;
const mainDisp = document.getElementById('main-display');
const badge = document.getElementById('level-badge');
const progress = document.getElementById('progress-bar');
const inputContainer = document.getElementById('input-container');
const userInput = document.getElementById('user-input');
const timerLabel = document.getElementById('timer-label');

async function startExperiment() {
    document.getElementById('start-overlay').style.display = 'none';
    runNextStep();
}

async function runNextStep() {
    if (stepIndex >= sequence.length) {
        showResults();
        return;
    }

    const s = sequence[stepIndex];
    badge.textContent = s.label;
    inputContainer.style.display = 'none';
    userInput.value = '';
    
    // Reset progress baru pred novým kolom
    resetProgressBar();

    // 1. Obrazovka Pripravte sa
    mainDisp.style.fontSize = "clamp(2rem, 10vw, 4rem)";
    mainDisp.textContent = "Pripravte sa...";
    await sleep(2000);
    mainDisp.style.fontSize = "clamp(3rem, 15vw, 10rem)";

    // 2. Zobrazenie číslic
    for (let d of s.digits) {
        mainDisp.textContent = d;
        await sleep(500);
        mainDisp.textContent = '';
        await sleep(50); 
    }

    // 3. Retenčná pauza
    await sleep(2000);

    // 4. Zobrazenie inputu
    mainDisp.textContent = '';
    userInput.placeholder = ".".repeat(s.digits.length);
    inputContainer.style.display = 'flex';
    userInput.focus();

    startTimer(12);
}

function startTimer(seconds) {
    let remaining = seconds;
    timerLabel.textContent = `Zostáva: ${remaining}s`;
    
    // Spustíme animáciu z 100% na 0%
    progress.style.transition = 'none';
    progress.style.width = '100%';
    setTimeout(() => {
        progress.style.transition = `width ${seconds * 1000}ms linear`;
        progress.style.width = '0%';
    }, 20);

    countdownInterval = setInterval(() => {
        remaining--;
        timerLabel.textContent = `Zostáva: ${remaining}s`;
        if (remaining <= 0) clearInterval(countdownInterval);
    }, 1000);

    inputTimeout = setTimeout(() => {
        submitAnswer();
    }, seconds * 1000);
}

function resetProgressBar() {
    progress.style.transition = 'none';
    progress.style.width = '0%';
}

function submitAnswer() {
    // Okamžité zastavenie všetkých časovačov a animácií
    clearTimeout(inputTimeout);
    clearInterval(countdownInterval);
    resetProgressBar();

    const s = sequence[stepIndex];
    const cleanInput = userInput.value.replace(/\D/g, ''); 
    const isCorrect = cleanInput === s.digits.join('');
    
    userResults.push({ lvl: s.lvl, correct: isCorrect });
    
    stepIndex++;
    runNextStep();
}

userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") submitAnswer(); });

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

function showResults() {
    badge.textContent = "";
    inputContainer.style.display = 'none';
    progress.style.display = 'none';
    
    const stats = [1, 2, 3, 4].map(l => {
        const ok = userResults.filter(r => r.lvl === l && r.correct).length;
        return `<tr><td>Level ${l} (${2*l + 1} číslic)</td><td>${ok} / 3</td></tr>`;
    }).join('');

    document.getElementById('screen').innerHTML = `
        <div class="results-container">
            <h2 style="font-family: 'DM Mono'; margin-bottom: 1.5rem;">Konečné výsledky</h2>
            
            <table class="results-table">
                <thead><tr><th>Úroveň</th><th>Úspešnosť</th></tr></thead>
                <tbody>${stats}</tbody>
            </table>

            <div class="card">
                <strong>Millerovo číslo (7±2)</strong><br>
                Väčšina ľudí zvláda 5-6 číslic, ale pri 7 a viac dochádza k dramatickému nárastu chýb.
            </div>
            <div class="card">
                <strong>Cowanov limit (4±1)</strong><br>
                Bez možnosti vedome spájať čísla do skupín je naša čistá kapacita len okolo 4 položiek.
            </div>
            <button onclick="location.reload()" style="margin-top:2rem; padding:12px 25px; cursor:pointer; font-family:'DM Mono'; border:1px solid black; background: white;">REŠTARTOVAŤ TEST</button>
        </div>
    `;
}
</script>
</body>
</html>
